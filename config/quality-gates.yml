# Quality Gates Configuration — dev-ownership skill
# Machine-readable quality gate thresholds.
# Used by pre-commit-check.sh and run-quality-gates.sh

version: "0.2.0"

gates:
  # Layer 0: Static Analysis Base (Testing Trophy foundation)
  # Hard block — fail = no commit
  static_analysis:
    enabled: true
    on_fail: block

    lint:
      tool: ruff  # Python: ruff | JS/TS: eslint | Go: golangci-lint
      args: ["check", "."]
      threshold: zero_errors

    type_check:
      tool: mypy  # Python: mypy | JS/TS: tsc --noEmit | Go: go vet
      args: ["--strict", "."]
      threshold: zero_errors

    security:
      tools:
        - bandit       # Python SAST
        - pip-audit    # dependency vulnerability scan
      threshold: zero_critical

    secret_detection:
      tool: gitleaks  # or detect-secrets
      args: ["detect", "--source", "."]
      threshold: zero_findings

  # Layer 1: Test Suite (every commit)
  test_suite:
    enabled: true
    on_fail: block

    unit_tests:
      ratio: 0.70  # 70% of all tests should be unit tests
      pass_rate: 1.0  # 100% must pass

    integration_tests:
      ratio: 0.20  # 20% of all tests

    e2e_tests:
      ratio: 0.10  # 10% max

    branch_coverage:
      threshold: 0.90  # 90% branch coverage
      on_fail: block

  # Layer 2: Test Quality (phase exit)
  test_quality:
    enabled: true
    on_fail: warn

    mutation_score:
      tool: mutmut  # Python: mutmut | Java: PIT | JS: Stryker
      threshold: 0.70  # 70% mutation score
      on_fail: warn

    complexity:
      tool: radon
      max_cyclomatic: 10  # per function
      on_fail: warn

    duplication:
      max_percent: 0.03  # 3% max duplication
      on_fail: warn

  # Layer 3: Cold-start / Runtime metrics
  cognitive_tracking:
    enabled: true
    on_fail: warn

    cdr:
      description: "Cognitive Debt Ratio — cold start proxy (N < 30 commits)"
      threshold: 0.15  # ≤15% unverified AI code
      formula: "unverified_ai_lines / total_active_lines"

    sr:
      description: "Stability Ratio — runtime metric (N ≥ 30 commits)"
      threshold: 2.4
      window: 15  # commits
      formula: "1 / (4 * sigma * (1 - sigma))"
      sigma_proxy: "14_day_file_closure_ratio"

  # Feynman Gate Quota
  feynman_gate:
    design_gate:
      skippable: false  # never skip design/architecture gates
    code_gate:
      quota_per_project: 1  # can skip 1 per project
      carry_over: true  # skipped gates carry to next project

# Trigger timing
triggers:
  static_analysis: on_commit
  test_suite: on_commit
  test_quality: on_phase_exit
  cognitive_tracking: on_phase_exit
  feynman_gate: on_phase_exit
